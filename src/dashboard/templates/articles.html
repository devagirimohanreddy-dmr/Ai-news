{% extends "base.html" %}
{% set active_page = "articles" %}

{% block title %}Articles{% endblock %}

{% block content %}
<h1>Articles</h1>

<!-- Filters -->
<div class="toolbar" id="article-filters">
    <div>
        <label class="text-sm" for="f-search">Search</label>
        <input type="text" id="f-search" placeholder="Title or URL..." style="width:200px;">
    </div>
    <div>
        <label class="text-sm" for="f-category">Category</label>
        <select id="f-category"><option value="">All</option></select>
    </div>
    <div>
        <label class="text-sm" for="f-source">Source</label>
        <select id="f-source"><option value="">All</option></select>
    </div>
    <div>
        <label class="text-sm" for="f-status">Status</label>
        <select id="f-status">
            <option value="">All</option>
            <option value="ingested">ingested</option>
            <option value="deduped">deduped</option>
            <option value="classified">classified</option>
            <option value="scored">scored</option>
            <option value="summarized">summarized</option>
            <option value="routed">routed</option>
        </select>
    </div>
    <div>
        <label class="text-sm" for="f-score-min">Score Min</label>
        <input type="number" id="f-score-min" style="width:80px;" min="0">
    </div>
    <div>
        <label class="text-sm" for="f-score-max">Score Max</label>
        <input type="number" id="f-score-max" style="width:80px;" min="0">
    </div>
    <div>
        <label class="text-sm" for="f-date-from">From</label>
        <input type="date" id="f-date-from">
    </div>
    <div>
        <label class="text-sm" for="f-date-to">To</label>
        <input type="date" id="f-date-to">
    </div>
    <div>
        <label class="text-sm">&nbsp;</label>
        <button onclick="currentPage=1;loadArticles();">Filter</button>
    </div>
    <div>
        <label class="text-sm">&nbsp;</label>
        <div class="view-toggle">
            <button id="view-cards" class="active" onclick="setView('cards')">Cards</button>
            <button id="view-table" onclick="setView('table')">Table</button>
        </div>
    </div>
</div>

<!-- Cards View -->
<div id="articles-cards" class="cards-grid">
    <div class="text-muted">Loading...</div>
</div>

<!-- Table View (hidden by default) -->
<div id="articles-table-wrap" class="table-wrap" style="display:none;">
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Source</th>
                <th>Categories</th>
                <th>Score</th>
                <th>Status</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="articles-table-body">
            <tr><td colspan="6" class="text-muted">Loading...</td></tr>
        </tbody>
    </table>
</div>

<!-- Pagination -->
<div class="pagination" id="articles-pagination"></div>

<!-- Detail panel (legacy, kept for table view) -->
<div id="article-detail" style="display:none;"></div>
{% endblock %}

{% block scripts %}
<script>
var currentPage = 1;
var currentView = 'cards';

function setView(view) {
    currentView = view;
    document.getElementById('view-cards').classList.toggle('active', view === 'cards');
    document.getElementById('view-table').classList.toggle('active', view === 'table');
    document.getElementById('articles-cards').style.display = view === 'cards' ? 'grid' : 'none';
    document.getElementById('articles-table-wrap').style.display = view === 'table' ? 'block' : 'none';
}

function getCategoryBadgeClass(cat) {
    var lc = cat.toLowerCase();
    if (lc.indexOf('ai') >= 0 || lc.indexOf('artificial') >= 0) return 'badge-cat-ai';
    if (lc.indexOf('ml') >= 0 || lc.indexOf('machine') >= 0 || lc.indexOf('model') >= 0) return 'badge-cat-ml';
    if (lc.indexOf('secur') >= 0 || lc.indexOf('cyber') >= 0) return 'badge-cat-security';
    if (lc.indexOf('cloud') >= 0 || lc.indexOf('infra') >= 0) return 'badge-cat-cloud';
    if (lc.indexOf('devops') >= 0 || lc.indexOf('deploy') >= 0) return 'badge-cat-devops';
    if (lc.indexOf('data') >= 0 || lc.indexOf('analy') >= 0) return 'badge-cat-data';
    return 'badge-cat-default';
}

function getAccentClass(a) {
    if (a.is_breaking) return 'accent-red';
    if (a.importance_score >= 8) return 'accent-orange';
    return 'accent-blue';
}

function getScoreClass(score) {
    if (score >= 8) return 'score-high';
    if (score >= 5) return 'score-mid';
    return 'score-low';
}

function buildQuery() {
    var params = new URLSearchParams();
    params.set('page', currentPage);
    var search = document.getElementById('f-search').value;
    if (search) params.set('search', search);
    var cat = document.getElementById('f-category').value;
    if (cat) params.set('category', cat);
    var src = document.getElementById('f-source').value;
    if (src) params.set('source_id', src);
    var status = document.getElementById('f-status').value;
    if (status) params.set('status', status);
    var smin = document.getElementById('f-score-min').value;
    if (smin) params.set('score_min', smin);
    var smax = document.getElementById('f-score-max').value;
    if (smax) params.set('score_max', smax);
    var df = document.getElementById('f-date-from').value;
    if (df) params.set('date_from', df);
    var dt = document.getElementById('f-date-to').value;
    if (dt) params.set('date_to', dt);
    return params.toString();
}

function escapeHtml(text) {
    if (!text) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(text));
    return div.innerHTML;
}

function loadArticles() {
    fetch('/admin/api/articles?' + buildQuery())
        .then(function(r){ return r.json(); })
        .then(function(data) {
            // --- Render Cards View ---
            var cardsContainer = document.getElementById('articles-cards');
            var tbody = document.getElementById('articles-table-body');

            if (!data.items.length) {
                cardsContainer.innerHTML = '<div class="text-muted">No articles found.</div>';
                tbody.innerHTML = '<tr><td colspan="6" class="text-muted">No articles found.</td></tr>';
                document.getElementById('articles-pagination').innerHTML = '';
                return;
            }

            // Cards
            var cardsHtml = '';
            data.items.forEach(function(a) {
                var accentClass = getAccentClass(a);
                var dateStr = a.created_at ? new Date(a.created_at).toLocaleDateString() : '';
                var scoreClass = getScoreClass(a.importance_score);

                cardsHtml += '<a href="/admin/articles/' + a.id + '" class="teams-card">';
                cardsHtml += '<div class="card-accent ' + accentClass + '"></div>';
                cardsHtml += '<div class="card-body">';

                // Title
                cardsHtml += '<div class="card-title">' + escapeHtml(a.title) + '</div>';

                // Category badges
                var cats = a.categories || [];
                if (cats.length) {
                    cardsHtml += '<div class="card-badges">';
                    cats.forEach(function(c) {
                        cardsHtml += '<span class="badge-pill ' + getCategoryBadgeClass(c) + '">' + escapeHtml(c) + '</span>';
                    });
                    cardsHtml += '</div>';
                }

                // Importance bar
                cardsHtml += '<div class="importance-bar ' + scoreClass + '">';
                cardsHtml += '<div class="bar-track"><div class="bar-fill" style="width:' + (a.importance_score / 10 * 100) + '%"></div></div>';
                cardsHtml += '<span class="bar-label">' + a.importance_score + '/10</span>';
                if (a.is_breaking) cardsHtml += ' <span class="badge badge-danger" style="font-size:.65rem;">BREAKING</span>';
                cardsHtml += '</div>';

                // Meta
                cardsHtml += '<p class="card-meta">' + escapeHtml(a.source_name);
                if (dateStr) cardsHtml += ' &middot; ' + dateStr;
                var statusCls = a.pipeline_status === 'routed' ? 'badge-success' :
                                a.pipeline_status === 'ingested' ? 'badge-muted' : 'badge-warning';
                cardsHtml += ' &middot; <span class="badge ' + statusCls + '" style="font-size:.65rem;">' + a.pipeline_status + '</span>';
                cardsHtml += '</p>';

                cardsHtml += '</div></a>';
            });
            cardsContainer.innerHTML = cardsHtml;

            // --- Render Table View ---
            var tableHtml = '';
            data.items.forEach(function(a) {
                var cats = (a.categories || []).map(function(c) {
                    return '<span class="badge badge-info">' + escapeHtml(c) + '</span>';
                }).join(' ');
                var statusCls = a.pipeline_status === 'routed' ? 'badge-success' :
                                a.pipeline_status === 'ingested' ? 'badge-muted' : 'badge-warning';
                var dateStr = a.created_at ? new Date(a.created_at).toLocaleDateString() : '-';
                tableHtml += '<tr class="clickable-row" onclick="window.location.href=\'/admin/articles/' + a.id + '\'">';
                tableHtml += '<td>' + escapeHtml(a.title.substring(0, 80)) + (a.title.length > 80 ? '...' : '') + '</td>';
                tableHtml += '<td class="text-sm">' + escapeHtml(a.source_name) + '</td>';
                tableHtml += '<td>' + (cats || '-') + '</td>';
                tableHtml += '<td>' + a.importance_score + (a.is_breaking ? ' <span class="badge badge-danger">BREAKING</span>' : '') + '</td>';
                tableHtml += '<td><span class="badge ' + statusCls + '">' + a.pipeline_status + '</span></td>';
                tableHtml += '<td class="text-sm">' + dateStr + '</td>';
                tableHtml += '</tr>';
            });
            tbody.innerHTML = tableHtml;

            // Pagination
            var pag = '';
            for (var i = 1; i <= data.pages; i++) {
                if (i === data.page) {
                    pag += '<span class="current">' + i + '</span>';
                } else {
                    pag += '<a href="#" onclick="currentPage=' + i + ';loadArticles();return false;">' + i + '</a>';
                }
            }
            document.getElementById('articles-pagination').innerHTML = pag;
        });
}

function loadFilterOptions() {
    // Load categories
    fetch('/admin/api/categories')
        .then(function(r){ return r.json(); })
        .then(function(cats) {
            var sel = document.getElementById('f-category');
            cats.forEach(function(c) {
                var opt = document.createElement('option');
                opt.value = c.name;
                opt.textContent = c.name + ' (' + c.article_count + ')';
                sel.appendChild(opt);
            });
        });
    // Load sources
    fetch('/admin/api/sources')
        .then(function(r){ return r.json(); })
        .then(function(sources) {
            var sel = document.getElementById('f-source');
            sources.forEach(function(s) {
                var opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                sel.appendChild(opt);
            });
        });
}

document.addEventListener('DOMContentLoaded', function() {
    loadFilterOptions();
    loadArticles();
});
</script>
{% endblock %}
