{% extends "base.html" %}
{% set active_page = "sources" %}

{% block title %}Sources{% endblock %}

{% block content %}
<h1>Sources Management</h1>

<!-- Add Source Form -->
<details id="add-source-form" style="margin-bottom:1rem;">
    <summary role="button" class="outline">+ Add New Source</summary>
    <form hx-post="/admin/api/sources"
          hx-target="#sources-table-body"
          hx-swap="innerHTML"
          hx-on::after-request="if(event.detail.successful) { this.reset(); loadSources(); }"
          style="margin-top:.75rem;">
        <div class="form-grid">
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Source name">
            </div>
            <div>
                <label for="url">URL</label>
                <input type="url" id="url" name="url" required placeholder="https://...">
            </div>
            <div>
                <label for="scraper_type">Scraper Type</label>
                <select id="scraper_type" name="scraper_type" required>
                    <option value="rss">RSS</option>
                    <option value="api">API</option>
                    <option value="firecrawl">Firecrawl</option>
                    <option value="playwright">Playwright</option>
                    <option value="readability">Readability</option>
                </select>
            </div>
            <div>
                <label for="schedule_cron">Cron Schedule</label>
                <input type="text" id="schedule_cron" name="schedule_cron" placeholder="*/30 * * * *">
            </div>
            <div>
                <label for="priority">Priority (1-3)</label>
                <input type="number" id="priority" name="priority" value="1" min="1" max="3">
            </div>
            <div>
                <label for="config_json">Config JSON</label>
                <input type="text" id="config_json" name="config_json" placeholder='{"key":"val"}'>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit">Add Source</button>
        </div>
    </form>
</details>

<!-- Sources Table -->
<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>URL</th>
                <th>Type</th>
                <th>Schedule</th>
                <th>Priority</th>
                <th>Last Scraped</th>
                <th>Errors</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="sources-table-body">
            <tr><td colspan="9" class="text-muted">Loading...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadSources() {
    fetch('/admin/api/sources')
        .then(function(r){ return r.json(); })
        .then(function(sources) {
            var tbody = document.getElementById('sources-table-body');
            if (!sources.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-muted">No sources configured.</td></tr>';
                return;
            }
            var html = '';
            sources.forEach(function(s) {
                var statusBadge = s.enabled
                    ? '<span class="badge badge-success">Enabled</span>'
                    : '<span class="badge badge-muted">Disabled</span>';
                var errorBadge = s.error_count > 0
                    ? '<span class="badge badge-danger">' + s.error_count + '</span>'
                    : '<span class="badge badge-success">0</span>';
                var lastScraped = s.last_scraped_at
                    ? new Date(s.last_scraped_at).toLocaleString()
                    : 'Never';
                var urlShort = s.url.length > 40 ? s.url.substring(0, 40) + '...' : s.url;

                html += '<tr id="source-row-' + s.id + '">';
                html += '<td>' + s.name + '</td>';
                html += '<td class="text-sm"><a href="' + s.url + '" target="_blank">' + urlShort + '</a></td>';
                html += '<td><span class="badge badge-info">' + s.scraper_type + '</span></td>';
                html += '<td class="text-sm">' + (s.schedule_cron || '-') + '</td>';
                html += '<td>' + s.priority + '</td>';
                html += '<td class="text-sm">' + lastScraped + '</td>';
                html += '<td>' + errorBadge + '</td>';
                html += '<td>' + statusBadge + '</td>';
                html += '<td style="white-space:nowrap;">';
                html += '<button class="outline" style="padding:.25rem .5rem;font-size:.78rem;margin-right:.25rem;" onclick="toggleSource(' + s.id + ')">' + (s.enabled ? 'Disable' : 'Enable') + '</button>';
                html += '<button class="outline" style="padding:.25rem .5rem;font-size:.78rem;margin-right:.25rem;" onclick="scrapeNow(' + s.id + ')">Scrape Now</button>';
                html += '<button class="outline secondary" style="padding:.25rem .5rem;font-size:.78rem;" onclick="deleteSource(' + s.id + ')">Delete</button>';
                html += '</td>';
                html += '</tr>';
            });
            tbody.innerHTML = html;
        });
}

function toggleSource(id) {
    fetch('/admin/api/sources/' + id + '/toggle', { method: 'POST' })
        .then(function(){ loadSources(); });
}

function scrapeNow(id) {
    fetch('/admin/api/sources/' + id + '/scrape', { method: 'POST' })
        .then(function(r){ return r.json(); })
        .then(function(data) {
            var flash = document.getElementById('flash-area');
            flash.innerHTML = '<div class="flash-success">Scrape task dispatched for ' + (data.source || 'source') + ' (task: ' + (data.task_id || 'queued') + ')</div>';
            setTimeout(function(){ flash.innerHTML = ''; }, 4000);
        });
}

function deleteSource(id) {
    if (!confirm('Delete this source?')) return;
    fetch('/admin/api/sources/' + id, { method: 'DELETE' })
        .then(function(){ loadSources(); });
}

// Load on page ready
document.addEventListener('DOMContentLoaded', loadSources);
</script>
{% endblock %}
