<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="f-bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- bg -->
  <rect width="32" height="32" rx="7" fill="url(#f-bg)"/>
  <!-- 4 source dots in corners -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="7" cy="7" r="2"/>
    <circle cx="25" cy="7" r="2"/>
    <circle cx="7" cy="25" r="2"/>
    <circle cx="25" cy="25" r="2"/>
  </g>
  <!-- spokes -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.55">
    <line x1="7" y1="7" x2="14" y2="14"/>
    <line x1="25" y1="7" x2="18" y2="14"/>
    <line x1="7" y1="25" x2="14" y2="18"/>
    <line x1="25" y1="25" x2="18" y2="18"/>
  </g>
  <!-- central sparkle -->
  <circle cx="16" cy="16" r="4.5" fill="#ffffff"/>
  <g transform="translate(16, 16)">
    <path d="M0 -3 L0.8 -0.8 L3 0 L0.8 0.8 L0 3 L-0.8 0.8 L-3 0 L-0.8 -0.8 Z" fill="#f59e0b"/>
  </g>
</svg>
