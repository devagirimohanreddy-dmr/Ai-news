<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI-News Aggregator">
  <defs>
    <linearGradient id="ainews-bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="0.55" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="hub-glow" cx="32" cy="32" r="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="spark-gold" x1="0" y1="0" x2="0" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fde047"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- rounded gradient background -->
  <rect width="64" height="64" rx="14" fill="url(#ainews-bg)"/>

  <!-- subtle radial glow around the hub -->
  <circle cx="32" cy="32" r="14" fill="url(#hub-glow)" opacity="0.35"/>

  <!-- connection lines (spokes) — multiple sources funneling into the center -->
  <g stroke="#ffffff" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
    <line x1="14" y1="14" x2="28" y2="28"/>
    <line x1="50" y1="14" x2="36" y2="28"/>
    <line x1="14" y1="50" x2="28" y2="36"/>
    <line x1="50" y1="50" x2="36" y2="36"/>
    <line x1="32" y1="10" x2="32" y2="26"/>
    <line x1="32" y1="54" x2="32" y2="38"/>
  </g>

  <!-- source nodes around the perimeter -->
  <g fill="#ffffff">
    <circle cx="14" cy="14" r="3"/>
    <circle cx="50" cy="14" r="3"/>
    <circle cx="14" cy="50" r="3"/>
    <circle cx="50" cy="50" r="3"/>
    <circle cx="32" cy="10" r="3"/>
    <circle cx="32" cy="54" r="3"/>
  </g>

  <!-- central AI core: white disc + golden sparkle -->
  <circle cx="32" cy="32" r="8" fill="#ffffff"/>
  <g transform="translate(32, 32)">
    <path d="M0 -5 L1.3 -1.3 L5 0 L1.3 1.3 L0 5 L-1.3 1.3 L-5 0 L-1.3 -1.3 Z"
          fill="url(#spark-gold)"/>
  </g>
</svg>
