services:
  # ---------------------------------------------------------------------------
  # One-shot migration runner.
  # Runs `alembic upgrade head` against Postgres and exits 0 when done.
  # The `app` and `celery-worker` services wait for this to complete
  # successfully before they start, guaranteeing the schema is in place.
  # ---------------------------------------------------------------------------
  migrator:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./alembic:/app/alembic
      - ./src:/app/src
    restart: "no"

  # ---------------------------------------------------------------------------
  # One-shot LLM model puller.
  # Waits for Ollama to be ready, then pulls llama3.2:3b once and exits.
  # The model lives on the `ollama_data` volume so re-runs are cheap.
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do
         echo 'waiting for ollama to be ready...'; sleep 2;
       done;
       ollama pull llama3.2:3b"
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    restart: "no"

  # ---------------------------------------------------------------------------
  # FastAPI application server
  # ---------------------------------------------------------------------------
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes:
      - ./src:/app/src  # dev hot reload
      - ./alembic:/app/alembic  # dev migrations
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Celery worker with embedded beat scheduler
  # ---------------------------------------------------------------------------
  celery-worker:
    build: .
    command: celery -A src.config.celery_app worker --loglevel=info -B --pool=solo
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ainews}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  ollama_data:
